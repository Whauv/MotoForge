apiVersion: apps/v1
kind: Deployment
metadata:
  name: motoforge-api
  labels:
    app: motoforge-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: motoforge-api
  template:
    metadata:
      labels:
        app: motoforge-api
    spec:
      containers:
        - name: motoforge-api
          image: gcr.io/YOUR_GCP_PROJECT_ID/motoforge-api:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: motoforge-api
spec:
  selector:
    app: motoforge-api
  ports:
    - port: 8000
      targetPort: 8000
